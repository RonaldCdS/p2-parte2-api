version: '3.8'

services:
  db_dev:
    image: postgres:15-alpine
    container_name: ecom_db_dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ecom_dev
    ports:
      - "5432:5432"
    volumes:
      - pg_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecom_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  db_test:
    image: postgres:15-alpine
    container_name: ecom_db_test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ecom_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecom_test"]
      interval: 3s
      timeout: 3s
      retries: 5

  app_tests:
    build: .
    container_name: ecom_app_tests
    environment:
      - DATABASE_URL=postgresql://postgres:password@db_test:5432/ecom_test
    depends_on:
      db_test:
        condition: service_healthy
    command: pytest -v

volumes:
  pg_dev_data: